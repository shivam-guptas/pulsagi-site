<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIGHTNING STUDIO | Salesforce Developer Toolkit</title>
  <meta name="description" content="LIGHTNING STUDIO is a premium browser-based Salesforce developer toolkit with formatters, generators, analyzers, explorers, and productivity workflows." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#04091d" />
  <link rel="canonical" href="https://pulsagi.com/tools/lightning-studio/" />
  <link rel="stylesheet" href="./assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body data-page="home" data-root=".">
  <div data-site-header></div>

  <main class="workspace-home">
    <aside class="sidebar-panel">
      <div class="sidebar-search">
        <input data-sidebar-search placeholder="Search Component..." />
        <span>⌕</span>
      </div>
      <div class="folder-list" data-sidebar-list></div>
    </aside>

    <section class="canvas-panel">
      <div class="canvas-surface">
        <div class="studio-hero">
          <h1 class="page-title">LIGHTNING STUDIO</h1>
          <p class="page-lead">Build Salesforce LWC development easy and fastest.</p>
          <div class="studio-pills">
            <a class="chip" href="./tools/lwc-generator/">LWC</a>
            <a class="chip" href="./tools/aura-generator/">AURA</a>
            <a class="chip" href="./tools/apex-class-generator/">APEX</a>
            <a class="chip" href="./tools/salesforce-markup-builder/">LIGHTNING TYPES</a>
            <a class="chip" href="./tools/graphql-explorer/">GRAPHQL</a>
            <a class="chip" href="./tools/rest-api-explorer/">REST API</a>
            <a class="chip" href="./tools/metadata-diff/">METADATA</a>
          </div>
        </div>

        <div class="studio-card-grid" data-feature-cards></div>

        <section class="section" style="margin-top: 20px;">
          <div class="panel">
            <div class="panel-header">
              <h2>Quick access</h2>
              <div class="top-actions">
                <a class="button secondary" href="./tools/">Open full tool directory</a>
                <a class="button ghost" href="./docs/">Docs</a>
              </div>
            </div>
            <div class="panel-body">
              <div class="faq-grid" data-home-faqs></div>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div data-site-footer></div>

  <script defer src="./assets/tool-registry.js"></script>
  <script defer src="./assets/utils.js"></script>
  <script defer src="./assets/generators.js"></script>
  <script defer src="./assets/analysis.js"></script>
  <script defer src="./assets/site.js"></script>
</body>
</html>
