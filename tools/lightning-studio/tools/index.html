<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Studio Tool Directory</title>
  <meta name="description" content="Browse Lightning Studio's Salesforce formatters, generators, analyzers, explorers, and builders." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#07111f" />
  <link rel="canonical" href="https://pulsagi.com/tools/lightning-studio/tools/" />
  <link rel="stylesheet" href="../assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body data-page="directory" data-root="..">
  <div class="site-shell">
    <div data-site-header></div>

    <main class="container">
      <section class="hero">
        <span class="eyebrow">Tools directory</span>
        <h1 class="page-title">One Salesforce toolkit. Multiple focused workflows.</h1>
        <p class="page-lead">Search and filter Lightning Studio tools across formatting, code generation, analysis, API exploration, and markup-building tasks.</p>
      </section>

      <section class="section">
        <div class="search-bar">
          <input class="input" data-tool-search placeholder="Search Apex formatter, JSON to Apex, metadata diff, REST explorer..." />
          <div class="toggle-row" data-category-filters></div>
        </div>
        <div class="card-grid" data-tool-results style="margin-top: 24px;"></div>
      </section>
    </main>

    <div data-site-footer></div>
  </div>

  <script defer src="../assets/tool-registry.js"></script>
  <script defer src="../assets/utils.js"></script>
  <script defer src="../assets/generators.js"></script>
  <script defer src="../assets/analysis.js"></script>
  <script defer src="../assets/site.js"></script>
</body>
</html>
