<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Salesforce Multi-Framework hero</title>
  <desc id="desc">Illustration showing React apps running on Salesforce Multi-Framework with GraphQL, Apex, UI APIs, App Launcher, and Experience Cloud.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f6fbff" />
      <stop offset="52%" stop-color="#eef8ff" />
      <stop offset="100%" stop-color="#fff6ec" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#0b5cab" />
      <stop offset="100%" stop-color="#31a7ff" />
    </linearGradient>
    <linearGradient id="reactGlow" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#61dafb" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)" />
  <circle cx="145" cy="110" r="92" fill="#dff5ff" opacity="0.85" />
  <circle cx="1065" cy="125" r="110" fill="#fff0d9" opacity="0.85" />
  <circle cx="1080" cy="600" r="95" fill="#def7ea" opacity="0.8" />

  <rect x="64" y="70" width="355" height="580" rx="28" fill="url(#panel)" stroke="#d8e7f5" stroke-width="2" filter="url(#shadow)" />
  <text x="96" y="118" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">React App</text>
  <text x="96" y="150" fill="#456073" font-family="Inter, Arial, sans-serif" font-size="20">Build with your preferred UI stack</text>

  <rect x="96" y="188" width="290" height="112" rx="22" fill="#f8fbff" stroke="#d6e6f3" />
  <rect x="118" y="208" width="70" height="70" rx="18" fill="#e6f7fd" />
  <g transform="translate(153 243)">
    <ellipse rx="34" ry="13" fill="none" stroke="url(#reactGlow)" stroke-width="5" />
    <ellipse rx="34" ry="13" transform="rotate(60)" fill="none" stroke="url(#reactGlow)" stroke-width="5" />
    <ellipse rx="34" ry="13" transform="rotate(120)" fill="none" stroke="url(#reactGlow)" stroke-width="5" />
    <circle r="7" fill="#0ea5e9" />
  </g>
  <text x="206" y="236" fill="#0f172a" font-family="IBM Plex Mono, monospace" font-size="19" font-weight="600">React</text>
  <text x="206" y="264" fill="#4f6476" font-family="IBM Plex Mono, monospace" font-size="17">Vite + npm + TS</text>

  <rect x="96" y="325" width="290" height="132" rx="22" fill="#fffaf3" stroke="#ecd9b7" />
  <text x="118" y="362" fill="#9a5b00" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700">UIBundle</text>
  <text x="118" y="394" fill="#3b4752" font-family="Inter, Arial, sans-serif" font-size="18">App metadata and assets</text>
  <text x="118" y="422" fill="#60707e" font-family="Inter, Arial, sans-serif" font-size="17">AppLauncher or Experience target</text>

  <rect x="96" y="485" width="290" height="124" rx="22" fill="#f3fbf8" stroke="#cbe9db" />
  <text x="118" y="522" fill="#0f766e" font-family="IBM Plex Mono, monospace" font-size="18" font-weight="700">Local Dev</text>
  <text x="118" y="554" fill="#3b4752" font-family="Inter, Arial, sans-serif" font-size="18">npm run dev</text>
  <text x="118" y="582" fill="#60707e" font-family="Inter, Arial, sans-serif" font-size="17">Live preview and deploy through Salesforce DX</text>

  <rect x="468" y="126" width="268" height="468" rx="30" fill="url(#accent)" filter="url(#shadow)" />
  <text x="602" y="186" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Salesforce</text>
  <text x="602" y="220" text-anchor="middle" fill="#dbeeff" font-family="Inter, Arial, sans-serif" font-size="22">Multi-Framework</text>

  <rect x="504" y="258" width="196" height="68" rx="18" fill="#ffffff" opacity="0.97" />
  <text x="602" y="301" text-anchor="middle" fill="#0b5cab" font-family="IBM Plex Mono, monospace" font-size="20" font-weight="700">Authentication</text>
  <rect x="504" y="348" width="196" height="68" rx="18" fill="#ffffff" opacity="0.97" />
  <text x="602" y="391" text-anchor="middle" fill="#0b5cab" font-family="IBM Plex Mono, monospace" font-size="20" font-weight="700">Security</text>
  <rect x="504" y="438" width="196" height="68" rx="18" fill="#ffffff" opacity="0.97" />
  <text x="602" y="481" text-anchor="middle" fill="#0b5cab" font-family="IBM Plex Mono, monospace" font-size="20" font-weight="700">Governance</text>
  <text x="602" y="550" text-anchor="middle" fill="#dbeeff" font-family="Inter, Arial, sans-serif" font-size="18">Same org permissions, sharing,</text>
  <text x="602" y="576" text-anchor="middle" fill="#dbeeff" font-family="Inter, Arial, sans-serif" font-size="18">and platform trust model</text>

  <rect x="790" y="96" width="344" height="156" rx="26" fill="url(#panel)" stroke="#d8e7f5" stroke-width="2" filter="url(#shadow)" />
  <text x="822" y="142" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Data and Services</text>
  <rect x="822" y="170" width="126" height="38" rx="19" fill="#e8f2ff" />
  <text x="885" y="194" text-anchor="middle" fill="#0b5cab" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">GraphQL</text>
  <rect x="962" y="170" width="138" height="38" rx="19" fill="#edf9f4" />
  <text x="1031" y="194" text-anchor="middle" fill="#0f766e" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">Apex REST</text>
  <text x="822" y="228" fill="#506373" font-family="Inter, Arial, sans-serif" font-size="18">UI API, user context, custom server-side logic</text>

  <rect x="790" y="284" width="344" height="150" rx="26" fill="url(#panel)" stroke="#d8e7f5" stroke-width="2" filter="url(#shadow)" />
  <text x="822" y="330" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Where It Runs</text>
  <rect x="822" y="356" width="142" height="38" rx="19" fill="#fff4e5" />
  <text x="893" y="380" text-anchor="middle" fill="#9a5b00" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">App Launcher</text>
  <rect x="980" y="356" width="120" height="38" rx="19" fill="#f0ecff" />
  <text x="1040" y="380" text-anchor="middle" fill="#6d28d9" font-family="IBM Plex Mono, monospace" font-size="16" font-weight="700">Experience</text>
  <text x="822" y="412" fill="#506373" font-family="Inter, Arial, sans-serif" font-size="18">Internal apps today, external portals through Experience Cloud</text>

  <rect x="790" y="466" width="344" height="148" rx="26" fill="url(#panel)" stroke="#d8e7f5" stroke-width="2" filter="url(#shadow)" />
  <text x="822" y="512" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Current Guardrails</text>
  <text x="822" y="548" fill="#506373" font-family="Inter, Arial, sans-serif" font-size="18">Beta only in scratch orgs and sandboxes</text>
  <text x="822" y="576" fill="#506373" font-family="Inter, Arial, sans-serif" font-size="18">No Lightning App Builder placement yet</text>

  <path d="M420 248 C 455 248, 470 248, 468 248" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M420 392 C 455 392, 470 392, 468 392" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M420 548 C 455 548, 470 548, 468 548" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />

  <path d="M736 184 C 760 184, 768 184, 790 184" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M736 358 C 760 358, 768 358, 790 358" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M736 538 C 760 538, 768 538, 790 538" stroke="#7bb6ff" stroke-width="6" fill="none" stroke-linecap="round" />
</svg>
