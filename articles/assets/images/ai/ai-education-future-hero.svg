  <text x="166" y="440" fill="#ffffff" font-family="Georgia, serif" font-size="66" font-weight="700">Forever</text>
  <text x="166" y="518" fill="#dce9fa" font-family="Source Sans 3, Arial, sans-serif" font-size="30">From lesson design and tutoring to assessment,</text>
  <text x="166" y="558" fill="#dce9fa" font-family="Source Sans 3, Arial, sans-serif" font-size="30">teacher training, and lifelong learning pathways.</text>
