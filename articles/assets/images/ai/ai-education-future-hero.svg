      <stop offset="100%" stop-color="#f7f2e8" />
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b5cab" />
      <stop offset="100%" stop-color="#1f3f6e" />
