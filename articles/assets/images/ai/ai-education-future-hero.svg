<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">How AI Will Change Education Forever</title>
  <desc id="desc">Hero image for an article about AI in education, teacher workflows, student learning, and assessment change.</desc>
  <defs>
